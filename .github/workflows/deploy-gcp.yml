name: CI/CD to GCP VM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: "21"
  APP_NAME: the-star-g2
  GCE_HOST: ${{ vars.GCE_HOST }}
  GCE_USER: ${{ vars.GCE_USER }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw test -B

  build-and-deploy:
    name: Build & Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t "${{ env.APP_NAME }}:${{ github.sha }}" .

      - name: Save Docker image
        run: docker save "${{ env.APP_NAME }}:${{ github.sha }}" | gzip > image.tar.gz

      - name: Copy image to VM
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.GCE_HOST }}
          username: ${{ env.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          source: image.tar.gz
          target: /tmp/

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.GCE_HOST }}
          username: ${{ env.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script_stop: true
          script: |
            gunzip -c /tmp/image.tar.gz | docker load
            rm -f /tmp/image.tar.gz
            export IMAGE="${{ env.APP_NAME }}:${{ github.sha }}"
            export APP_NAME="${{ env.APP_NAME }}"
            export DEPLOY_SOURCE=local
            bash /opt/${{ env.APP_NAME }}/deploy.sh