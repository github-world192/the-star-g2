spring:
  application:
    name: hotel-system

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:h2:mem:hoteldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8081}

app:
  oauth2:
    redirect-uri: /callback

logging:
  level:
    org.springframework.security: INFO