<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<body>
<header class="top-bar" th:fragment="header(activePage)">
    <div class="brand-inline">
        <a th:href="@{/}" class="brand-link">
            <span class="brand-cn">東方之星</span>
            <span class="brand-divider">|</span>
            <span class="brand-en">THE STAR</span>
        </a>
    </div>

    <nav class="main-nav">
        <a th:href="@{/}" th:classappend="${activePage == 'home'} ? 'active'">首頁</a>
        <a th:href="@{/rooms}" th:classappend="${activePage == 'rooms'} ? 'active'">訂房</a>
        <a th:href="@{/shop}" th:classappend="${activePage == 'shop'} ? 'active'">購物</a>
        <a th:href="@{/my/bookings}" th:classappend="${activePage == 'bookings'} ? 'active'">我的訂房</a>
        <a th:href="@{/my/orders}" th:classappend="${activePage == 'orders'} ? 'active'">我的訂單</a>
    </nav>

    <div class="top-actions">
        <button type="button" class="avatar-btn" id="profile-trigger" aria-label="個人資料"
                th:if="${user != null}">
            <img th:if="${avatarUrl != null}" th:src="${avatarUrl}" alt="大頭貼" class="avatar-img">
            <span th:if="${avatarUrl == null}" class="avatar-fallback"
                  th:text="${#strings.substring(user.name, 0, 1)}">G</span>
        </button>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline">登出</button>
        </form>
    </div>
</header>
</body>
</html>
