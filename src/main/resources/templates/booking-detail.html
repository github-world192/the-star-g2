<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂房詳情 - 東方之星 The Star</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="home-page">
    <div th:replace="~{fragments/nav :: header('bookings')}"></div>

    <main class="page-content">
        <div class="page-header">
            <a th:href="@{/my/bookings}" class="back-link">← 返回我的訂房</a>
            <h1>訂房詳情</h1>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <article class="detail-card">
            <dl class="detail-list">
                <div>
                    <dt>訂單編號</dt>
                    <dd th:text="${booking.id}">1</dd>
                </div>
                <div>
                    <dt>房型</dt>
                    <dd th:text="${booking.roomName}">經典雙人房</dd>
                </div>
                <div>
                    <dt>入住日期</dt>
                    <dd th:text="${#temporals.format(booking.checkIn, 'yyyy/MM/dd')}">2026/06/25</dd>
                </div>
                <div>
                    <dt>退房日期</dt>
                    <dd th:text="${#temporals.format(booking.checkOut, 'yyyy/MM/dd')}">2026/06/27</dd>
                </div>
                <div>
                    <dt>總金額</dt>
                    <dd th:text="'NT$ ' + ${#numbers.formatDecimal(booking.totalPrice, 0, 'COMMA', 0, 'POINT')}">NT$ 6,400</dd>
                </div>
                <div>
                    <dt>狀態</dt>
                    <dd>
                        <span class="status-badge" th:classappend="' status-' + ${#strings.toLowerCase(booking.status.name())}"
                              th:text="${booking.status.name() == 'CONFIRMED' ? '已確認' : '已取消'}">已確認</span>
                    </dd>
                </div>
                <div>
                    <dt>建立時間</dt>
                    <dd th:text="${#temporals.format(booking.createdAt, 'yyyy/MM/dd HH:mm')}">2026/06/23 10:00</dd>
                </div>
            </dl>

            <form th:if="${booking.status.name() == 'CONFIRMED'}"
                  th:action="@{/my/bookings/{id}/cancel(id=${booking.id})}" method="post" class="detail-actions">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-secondary" onclick="return confirm('確定要取消此訂房嗎？')">取消訂房</button>
            </form>
        </article>
    </main>
</body>
</html>
