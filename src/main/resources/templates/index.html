<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁 - 東方之星 The Star</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="home-page">
    <header class="top-bar">
        <div class="brand-inline">
            <span class="brand-cn">東方之星</span>
            <span class="brand-divider">|</span>
            <span class="brand-en">THE STAR</span>
        </div>

        <div class="top-actions">
            <button type="button" class="avatar-btn" id="profile-trigger" aria-label="個人資料">
                <img th:if="${avatarUrl != null}" th:src="${avatarUrl}" alt="大頭貼" class="avatar-img">
                <span th:if="${avatarUrl == null}" class="avatar-fallback"
                      th:text="${user != null ? #strings.substring(user.name, 0, 1) : 'G'}">G</span>
            </button>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline">登出</button>
            </form>
        </div>
    </header>

    <main class="hero">
        <div class="hero-content">
            <p class="hero-eyebrow">WELCOME TO THE STAR</p>
            <h1 th:text="'歡迎，' + ${user != null ? user.name : '尊貴旅客'}">歡迎</h1>
            <p class="hero-desc">東方之星飯店管理系統，為您打造尊榮、舒適的星級住宿體驗。</p>
            <div class="hero-cards">
                <article class="feature-card">
                    <h3>線上訂房</h3>
                    <p>即將開放，輕鬆預訂您的理想房型。</p>
                </article>
                <article class="feature-card">
                    <h3>客房服務</h3>
                    <p>尊享貼心服務，滿足您的每一項需求。</p>
                </article>
                <article class="feature-card">
                    <h3>會員專屬</h3>
                    <p>累積住宿積分，解鎖更多星級禮遇。</p>
                </article>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="profile-modal" hidden>
        <div class="modal" role="dialog" aria-labelledby="profile-title" aria-modal="true">
            <button type="button" class="modal-close" id="profile-close" aria-label="關閉">&times;</button>
            <h2 id="profile-title">個人資料</h2>

            <div th:if="${profileSaved == true}" class="alert alert-success">個人資料已更新。</div>
            <div th:if="${profileError != null}" class="alert alert-error" th:text="${profileError}">更新失敗</div>

            <div class="profile-preview">
                <img th:if="${avatarUrl != null}" th:src="${avatarUrl}" alt="大頭貼預覽" id="avatar-preview" class="profile-avatar">
                <span th:if="${avatarUrl == null}" class="profile-avatar profile-avatar-fallback" id="avatar-preview-fallback"
                      th:text="${user != null ? #strings.substring(user.name, 0, 1) : 'G'}">G</span>
            </div>

            <form th:action="@{/profile}" method="post" class="profile-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <label for="name">姓名</label>
                <input type="text" id="name" name="name" required maxlength="100"
                       th:value="${user != null ? user.name : ''}">

                <label for="email">Email</label>
                <input type="email" id="email" th:value="${user != null ? user.email : ''}" disabled>

                <label for="phone">電話</label>
                <input type="tel" id="phone" name="phone" maxlength="20"
                       th:value="${user != null ? user.phone : ''}" placeholder="選填">

                <label for="avatarUrl">大頭貼網址</label>
                <input type="url" id="avatarUrl" name="avatarUrl" maxlength="500"
                       th:value="${user != null ? user.avatarUrl : ''}"
                       placeholder="可貼上圖片網址自訂大頭貼">

                <label>角色</label>
                <input type="text" th:value="${user != null ? user.role : 'GUEST'}" disabled>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="profile-cancel">取消</button>
                    <button type="submit" class="btn btn-primary">儲存變更</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/profile.js}"></script>
    <script th:if="${profileSaved == true or profileError != null}">
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('profile-modal').hidden = false;
            document.body.classList.add('modal-open');
        });
    </script>
</body>
</html>
